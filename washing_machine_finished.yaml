blueprint:
  name: Washing Machine Finished (Power Monitor + Repeat Reminder + Door/Vibration Stop + Cooldown)
  description: >
    Detects when a washing machine finishes by monitoring power usage from a
    smart plug. Sends a notification when power stays below a threshold for a
    set duration, with optional repeating reminders that stop when power rises,
    a door opens, or a vibration/motion sensor detects activity. Includes an
    optional cooldown to prevent repeated triggers.
  domain: automation

  input:
    power_sensor:
      name: Power Sensor
      description: The power sensor from your smart plug (in Watts).
      selector:
        entity:
          domain: sensor

    running_threshold:
      name: Running Threshold (W)
      description: Power above this means the machine is running.
      default: 50
      selector:
        number:
          min: 1
          max: 500
          unit_of_measurement: W
          mode: box

    finished_threshold:
      name: Finished Threshold (W)
      description: Power below this means the cycle has ended.
      default: 5
      selector:
        number:
          min: 0
          max: 50
          unit_of_measurement: W
          mode: box

    finished_duration:
      name: Duration Below Threshold
      description: How long power must stay below the finished threshold.
      default: "00:03:00"
      selector:
        duration: {}

    notify_service:
      name: Notification Service
      description: The notify service to call (e.g. notify.mobile_app_phone).
      selector:
        text: {}

    message:
      name: Notification Message
      description: Message sent when the cycle finishes.
      default: "The washing machine has finished."
      selector:
        text: {}

    require_running_first:
      name: Require machine to have been running first?
      description: Prevents false alerts if the machine never actually ran.
      default: true
      selector:
        boolean: {}

    enable_repeat:
      name: Enable Repeat Reminder?
      description: Send repeated reminders until the machine is no longer idle.
      default: false
      selector:
        boolean: {}

    repeat_interval:
      name: Reminder Interval
      description: How often to repeat the reminder.
      default: "00:10:00"
      selector:
        duration: {}

    repeat_message:
      name: Reminder Message
      description: Message sent for each repeat reminder.
      default: "Reminder: The washing machine has finished."
      selector:
        text: {}

    door_sensor:
      name: Door Sensor (optional)
      description: A door or lid sensor that stops reminders when opened.
      default: ""
      selector:
        entity:
          domain: binary_sensor
          device_class: door

    vibration_sensor:
      name: Vibration/Motion Sensor (optional)
      description: A sensor that detects movement when the machine is opened or emptied.
      default: ""
      selector:
        entity:
          domain: binary_sensor
          device_class:
            - vibration
            - motion

    enable_cooldown:
      name: Enable Cooldown?
      description: Prevent the automation from triggering again for a set time.
      default: false
      selector:
        boolean: {}

    cooldown_duration:
      name: Cooldown Duration
      description: How long to wait before allowing another trigger.
      default: "00:30:00"
      selector:
        duration: {}

trigger:
  - platform: numeric_state
    entity_id: !input power_sensor
    below: !input finished_threshold
    for: !input finished_duration

condition:
  - condition: or
    conditions:
      - condition: template
        value_template: "{{ not (require_running_first | default(true)) }}"
      - condition: numeric_state
        entity_id: !input power_sensor
        above: !input running_threshold
        for: "00:01:00"

  - condition: or
    conditions:
      - condition: template
        value_template: "{{ not (enable_cooldown | default(false)) }}"
      - condition: template
        value_template: >
          {% set last = this.attributes.last_triggered %}
          {% if last == none %}
            true
          {% else %}
            {{ (now() - last).total_seconds() > (cooldown_duration.total_seconds() | int) }}
          {% endif %}

action:
  - service: !input notify_service
    data:
      message: !input message

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ enable_repeat }}"
        sequence:
          - repeat:
              until:
                - condition: or
                  conditions:
                    - condition: numeric_state
                      entity_id: !input power_sensor
                      above: !input finished_threshold
                    - condition: template
                      value_template: >
                        {% set door = door_sensor %}
                        {{ door != '' and is_state(door, 'on') }}
                    - condition: template
                      value_template: >
                        {% set vib = vibration_sensor %}
                        {{ vib != '' and is_state(vib, 'on') }}
              sequence:
                - delay: !input repeat_interval
                - service: !input notify_service
                  data:
                    message: !input repeat_message

mode: single